<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Eid Mubarak | VIP Special Card</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Amiri:ital,wght@0,400;0,700;1,400&family=Cinzel+Decorative:wght@700&family=Great+Vibes&display=swap');

        * {
            margin: 0; padding: 0; box-sizing: border-box;
            user-select: none; -webkit-tap-highlight-color: transparent;
        }

        body {
            background: #010604;
            min-height: 100vh;
            overflow-x: hidden;
            overflow-y: auto; /* Enable scrolling for mobile friendliness */
            font-family: 'Amiri', serif;
            color: #fff;
            perspective: 1200px;
        }

        /* Video Background Wrapper */
        #video-bg-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            overflow: hidden;
        }

        #video-bg {
            width: 100%;
            height: 100%;
            object-fit: cover;
            opacity: 0.4; /* Subtle background presence */
        }

        canvas {
            position: fixed; top: 0; left: 0;
            width: 100%; height: 100%; z-index: 1; pointer-events: none;
        }

        /* --- 3D Royal Gates --- */
        #gate-container {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            z-index: 1000; display: flex; transform-style: preserve-3d;
            background: #000;
        }

        .gate {
            width: 50vw; height: 100vh;
            background: linear-gradient(135deg, #093322 0%, #03120c 100%);
            position: relative; transition: transform 2s cubic-bezier(0.25, 1, 0.5, 1);
            display: flex; align-items: center; border: 2px solid #d4af37;
        }

        #gate-left { transform-origin: left; border-right: 5px solid #d4af37; box-shadow: inset -10px 0 30px rgba(0,0,0,0.8); }
        #gate-right { transform-origin: right; border-left: 5px solid #d4af37; box-shadow: inset 10px 0 30px rgba(0,0,0,0.8); }

        #open-btn {
            position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%) translateZ(20px);
            width: 120px; height: 120px;
            background: radial-gradient(circle, #ffdf73, #b38728, #4a3500);
            border-radius: 50%; z-index: 1001; cursor: pointer;
            box-shadow: 0 0 40px #d4af37;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            border: 4px solid #fff; animation: pulse 2s infinite;
        }

        #open-btn span { font-family: 'Cinzel Decorative', cursive; color: #3e2700; font-size: 1.2rem; font-weight: bold; }

        /* --- Main Content Layout --- */
        #main-content {
            display: none;
            flex-direction: column;
            align-items: center;
            width: 100%;
            padding: 40px 15px;
            position: relative;
            z-index: 10;
        }

        #card {
            display: flex; flex-direction: column; align-items: center;
            padding: 30px 20px; width: 100%; max-width: 450px;
            background: rgba(5, 28, 19, 0.85); border: 2px solid rgba(212, 175, 55, 0.7);
            border-radius: 25px; box-shadow: 0 20px 50px rgba(0,0,0,0.9);
            backdrop-filter: blur(10px); transform-style: preserve-3d;
            margin-bottom: 30px;
        }

        .bismillah { font-size: 1.8rem; color: #d4af37; margin-bottom: 10px; }
        .moon-icon { font-size: 3rem; margin-bottom: 15px; filter: drop-shadow(0 0 10px #fceea7); }
        
        .greeting-name {
            font-family: 'Cinzel Decorative', cursive; font-size: 1.8rem;
            color: #ffdf73; text-align: center; margin-bottom: 25px;
            text-shadow: 0 4px 10px rgba(0,0,0,0.5);
        }

        /* Lowered Message Box */
        .message-box {
            width: 100%; min-height: 140px;
            padding: 20px; background: rgba(0,0,0,0.5);
            border-radius: 15px; border: 1px solid rgba(212, 175, 55, 0.3);
            margin-top: 10px; /* Lowered position */
        }

        .typewriter-text {
            font-size: 1.1rem; line-height: 1.6; color: #f1f1f1;
            text-align: center; min-height: 1.2rem;
        }

        .from-section {
            margin-top: 30px; text-align: center;
        }

        .from-label { font-size: 0.9rem; color: #d4af37; text-transform: uppercase; letter-spacing: 2px; }
        .from-name {
            font-family: 'Great Vibes', cursive; font-size: 2.8rem;
            color: #fceea7; text-shadow: 0 0 15px #d4af37;
        }

        /* Share Section */
        .share-card {
            width: 100%; max-width: 450px;
            background: rgba(255,255,255,0.05);
            padding: 20px; border-radius: 20px;
            border: 1px dashed #d4af37;
        }

        input[type="text"] {
            width: 100%; padding: 15px; border-radius: 12px; border: 1px solid #d4af37;
            background: rgba(0,0,0,0.8); color: #fff; text-align: center;
            font-size: 1rem; margin-bottom: 15px; outline: none;
        }

        .share-btn {
            width: 100%; padding: 15px; border: none; border-radius: 12px;
            background: linear-gradient(45deg, #B38728, #FBF5B7, #B38728);
            color: #3e2700; font-family: 'Cinzel Decorative', cursive;
            font-weight: bold; font-size: 1rem; cursor: pointer;
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
        }

        /* Animations */
        @keyframes pulse { 0%, 100% { transform: translate(-50%, -50%) scale(1); } 50% { transform: translate(-50%, -50%) scale(1.1); box-shadow: 0 0 60px #d4af37; } }
        
        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        .animate-in { animation: fadeIn 1s ease forwards; }

        #audio-toggle {
            position: fixed; bottom: 20px; right: 20px; z-index: 100;
            background: rgba(212,175,55,0.3); border: 1px solid #d4af37;
            width: 50px; height: 50px; border-radius: 50%; color: #fff;
            cursor: pointer; display: none;
        }
    </style>
</head>
<body>

    <!-- Video Background -->
    <div id="video-bg-container">
        <video id="video-bg" loop playsinline muted>
            <source src="https://files.catbox.moe/y9auh7.mp4" type="video/mp4">
        </video>
    </div>

    <!-- Particle Overlay -->
    <canvas id="particles"></canvas>

    <!-- Entry Gates -->
    <div id="gate-container">
        <div id="gate-left" class="gate"></div>
        <div id="gate-right" class="gate"></div>
        <div id="open-btn" onclick="initExperience()">
            <span>OPEN</span>
            <div style="font-size: 0.6rem; color: #fff; margin-top: 5px;">VIP GIFT</div>
        </div>
    </div>

    <!-- Main Scrollable Content -->
    <div id="main-content">
        <div id="card" class="animate-in">
            <div class="bismillah">﷽</div>
            <div class="moon-icon">🌙</div>
            <h1 class="greeting-name">Eid Mubarak<br><span id="display-name" style="color: #fff; font-size: 1.5rem;"></span></h1>
            
            <div class="message-box">
                <div class="typewriter-text" id="typed-msg"></div>
            </div>

            <div class="from-section">
                <div class="from-label">Specially Sent By</div>
                <div class="from-name" id="sender-name">Ramzan Ahsan</div>
            </div>
        </div>

        <div class="share-card animate-in" style="animation-delay: 0.5s;">
            <p style="text-align: center; margin-bottom: 15px; color: #d4af37; font-size: 0.9rem;">Create Your Own VIP Card</p>
            <input type="text" id="userInput" placeholder="Enter Your Name Here...">
            <button class="share-btn" onclick="generateAndShare()">SEND TO WHATSAPP</button>
        </div>

        <p style="margin-top: 40px; opacity: 0.5; font-size: 0.8rem; text-align: center;">Scroll down to see more ✨</p>
        <div style="height: 100px;"></div> <!-- Bottom Spacing for scrolling -->
    </div>

    <button id="audio-toggle" onclick="toggleMute()">🔊</button>

    <script>
        const video = document.getElementById('video-bg');
        const displayName = document.getElementById('display-name');
        const senderName = document.getElementById('sender-name');
        
        // 1. URL Parameter Logic
        window.onload = () => {
            const params = new URLSearchParams(window.location.search);
            const nameParam = params.get('name');
            
            if (nameParam) {
                // If link is clicked, the person who sent it becomes the 'Sender'
                // and the greeting is general, or we can swap logic.
                // Standard VIP behavior: Name in URL is the Creator.
                senderName.innerText = nameParam;
                displayName.innerText = "To You & Family";
            }
        };

        // 2. Open Experience
        function initExperience() {
            video.muted = false;
            video.play().catch(e => console.log("Audio play blocked"));
            
            document.getElementById('gate-left').style.transform = 'rotateY(110deg)';
            document.getElementById('gate-right').style.transform = 'rotateY(-110deg)';
            document.getElementById('open-btn').style.opacity = '0';
            document.getElementById('open-btn').style.pointerEvents = 'none';

            setTimeout(() => {
                document.getElementById('gate-container').style.display = 'none';
                document.getElementById('main-content').style.display = 'flex';
                document.getElementById('audio-toggle').style.display = 'block';
                startTypewriter();
                initParticles();
            }, 1500);
        }

        // 3. Typewriter Effect
        const msg = "Assalamu Alaykum! ✨\n\nIs barkat bhari Eid par Allah aapki zindagi mein khushiyan aur kamiyabi ata farmaye. May this Eid bring peace, prosperity, and joy to your heart. 🤲🌙";
        let charIndex = 0;
        function startTypewriter() {
            if (charIndex < msg.length) {
                document.getElementById('typed-msg').innerHTML += msg.charAt(charIndex) === '\n' ? '<br>' : msg.charAt(charIndex);
                charIndex++;
                setTimeout(startTypewriter, 50);
            }
        }

        // 4. Mute/Unmute
        function toggleMute() {
            const btn = document.getElementById('audio-toggle');
            if (video.muted) {
                video.muted = false;
                btn.innerHTML = "🔊";
            } else {
                video.muted = true;
                btn.innerHTML = "🔇";
            }
        }

        // 5. WhatsApp Share Logic
        function generateAndShare() {
            const name = document.getElementById('userInput').value.trim();
            if (!name) {
                alert("Please enter your name first!");
                return;
            }
            const baseUrl = window.location.origin + window.location.pathname;
            const finalUrl = `${baseUrl}?name=${encodeURIComponent(name)}`;
            const waMsg = `🌙 *Eid Mubarak!*\n\n*${name}* ne aapke liye ek VIP Eid Surprise bheja hai! ✨🎁\n\nIse dekhne ke liye neele link par click karein:\n👉 ${finalUrl}`;
            
            window.open(`https://api.whatsapp.com/send?text=${encodeURIComponent(waMsg)}`);
        }

        // 6. Particle System
        const canvas = document.getElementById('particles');
        const ctx = canvas.getContext('2d');
        let particles = [];

        function initParticles() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            for(let i=0; i<60; i++) {
                particles.push({
                    x: Math.random() * canvas.width,
                    y: Math.random() * canvas.height,
                    size: Math.random() * 2 + 1,
                    speed: Math.random() * 1 + 0.5,
                    opacity: Math.random()
                });
            }
            animateParticles();
        }

        function animateParticles() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            particles.forEach(p => {
                p.y -= p.speed;
                if(p.y < 0) p.y = canvas.height;
                ctx.fillStyle = `rgba(212, 175, 55, ${p.opacity})`;
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.size, 0, Math.PI*2);
                ctx.fill();
            });
            requestAnimationFrame(animateParticles);
        }

        window.addEventListener('resize', () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        });

    </script>
</body>
</html>
