<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Eid Mubarak | VIP Card by Ramzan Ahsan</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Amiri:ital,wght@0,400;0,700;1,400&family=Cinzel+Decorative:wght@700&family=Great+Vibes&display=swap');

        * {
            margin: 0; padding: 0; box-sizing: border-box;
            user-select: none; -webkit-tap-highlight-color: transparent;
        }

        body {
            background: radial-gradient(circle at center, #062116 0%, #010604 100%);
            height: 100vh; overflow: hidden;
            font-family: 'Amiri', serif; color: #fff;
            perspective: 1200px; /* 3D Camera */
        }

        /* Particles & Fireworks Canvas */
        canvas {
            position: absolute; top: 0; left: 0;
            width: 100%; height: 100%; z-index: 1; pointer-events: none;
        }

        /* Floating Lanterns */
        .fanoos {
            position: absolute; width: 40px; opacity: 0.6;
            animation: floatUp 15s linear infinite; z-index: 2;
            filter: drop-shadow(0 0 10px #d4af37);
        }
        .fanoos:nth-child(1) { left: 10%; animation-duration: 20s; width: 30px; }
        .fanoos:nth-child(2) { left: 85%; animation-duration: 18s; width: 50px; animation-delay: 2s;}
        .fanoos:nth-child(3) { left: 50%; animation-duration: 25s; width: 35px; animation-delay: 5s;}

        /* --- 3D Royal Gates --- */
        #gate-container {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            z-index: 100; display: flex; transform-style: preserve-3d;
        }

        .gate {
            width: 50vw; height: 100vh;
            background: linear-gradient(135deg, #093322 0%, #03120c 100%);
            position: relative; transition: transform 2s cubic-bezier(0.25, 1, 0.5, 1);
            display: flex; align-items: center; border: 2px solid #d4af37;
        }

        .gate::before {
            content: ""; position: absolute; width: 100%; height: 100%;
            background-image: repeating-linear-gradient(45deg, transparent, transparent 20px, rgba(212, 175, 55, 0.05) 20px, rgba(212, 175, 55, 0.05) 40px);
        }

        #gate-left { transform-origin: left; border-right: 5px solid #d4af37; box-shadow: inset -10px 0 30px rgba(0,0,0,0.8); }
        #gate-right { transform-origin: right; border-left: 5px solid #d4af37; box-shadow: inset 10px 0 30px rgba(0,0,0,0.8); }

        /* Lock Button */
        #open-btn {
            position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%) translateZ(20px);
            width: 140px; height: 140px;
            background: radial-gradient(circle, #ffdf73, #b38728, #4a3500);
            border-radius: 50%; z-index: 101; cursor: pointer;
            box-shadow: 0 0 40px #d4af37, inset 0 0 20px #fff;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            border: 6px solid #fff; animation: pulse3D 2s infinite; transition: 0.8s ease-in-out;
        }

        #open-btn span { font-family: 'Cinzel Decorative', cursive; color: #3e2700; font-size: 1.6rem; text-shadow: 1px 1px 2px rgba(255,255,255,0.8); }
        .tap-hint { font-size: 0.9rem; margin-top: 5px; color: #fff; text-shadow: 0 0 5px #000; letter-spacing: 2px;}

        /* --- 3D Main Card Container --- */
        #card-wrapper {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            display: none; justify-content: center; align-items: center;
            z-index: 10; transform-style: preserve-3d; perspective: 1000px;
        }

        #card {
            display: flex; flex-direction: column; align-items: center;
            padding: 30px 20px; width: 92%; max-width: 450px;
            background: rgba(5, 28, 19, 0.75); border: 2px solid rgba(212, 175, 55, 0.6);
            border-radius: 20px; box-shadow: 0 20px 50px rgba(0,0,0,0.9), inset 0 0 30px rgba(212, 175, 55, 0.2);
            backdrop-filter: blur(15px); transform-style: preserve-3d;
            animation: flipIn 1.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
            position: relative; overflow: hidden; /* For Glare */
        }

        /* 3D Light Glare (Shine Effect) */
        .glare {
            position: absolute; top: -50%; left: -50%; width: 200%; height: 200%;
            background: radial-gradient(circle at 50% 50%, rgba(255, 255, 255, 0.15), transparent 50%);
            pointer-events: none; transform: translateZ(10px); transition: 0.1s;
        }

        /* Floating 3D Elements */
        .bismillah { font-size: 2rem; color: #d4af37; transform: translateZ(40px); margin-bottom: 5px; text-shadow: 0 0 10px rgba(212,175,55,0.8); }
        .moon-icon { font-size: 3.5rem; transform: translateZ(50px); filter: drop-shadow(0 0 20px #fceea7); animation: float 3s infinite ease-in-out; margin-bottom: 10px;}
        
        /* 3D Extruded Text */
        .text-3d {
            font-family: 'Cinzel Decorative', cursive; font-size: 2.2rem; margin-bottom: 15px;
            color: #ffdf73; transform: translateZ(60px);
            text-shadow: 0px 1px 0px #b38728, 0px 2px 0px #b38728, 0px 3px 0px #8a6d1c, 0px 8px 15px rgba(0,0,0,0.8);
        }

        /* Typewriter Box */
        .message-box {
            width: 100%; min-height: 120px;
            padding: 15px; background: rgba(0,0,0,0.4);
            border-left: 3px solid #d4af37; border-right: 3px solid #d4af37;
            border-radius: 10px; transform: translateZ(30px);
            display: flex; align-items: center; justify-content: center;
        }

        .typewriter-text {
            font-size: 1.2rem; line-height: 1.7; color: #f1f1f1;
            white-space: pre-wrap; /* Keeps line breaks */
            text-shadow: 1px 1px 5px #000; text-align: center;
        }

        .typing-cursor {
            display: inline-block; width: 3px; height: 1.2rem;
            background-color: #d4af37; animation: blink 0.7s infinite;
        }

        .divider { width: 80%; height: 1px; background: linear-gradient(90deg, transparent, #d4af37, transparent); margin: 20px 0; transform: translateZ(20px); }

        .from {
            font-size: 2.5rem; font-family: 'Great Vibes', cursive;
            color: #fceea7; text-shadow: 0 0 15px rgba(212,175,55,1);
            transform: translateZ(40px); margin-bottom: 20px;
        }

        /* 3D Share Input */
        .share-container { width: 100%; transform: translateZ(35px); display: flex; flex-direction: column; gap: 10px; }
        input[type="text"] {
            width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #d4af37;
            background: rgba(0,0,0,0.6); color: #fff; text-align: center; font-size: 1rem; outline: none;
        }
        .share-btn {
            width: 100%; padding: 12px; background: linear-gradient(to right, #B38728, #FBF5B7, #B38728);
            border: none; border-radius: 8px; color: #3e2700; font-family: 'Cinzel Decorative', cursive;
            font-size: 1.1rem; font-weight: bold; cursor: pointer; box-shadow: 0 5px 15px rgba(0,0,0,0.6); transition: 0.2s;
        }
        .share-btn:active { transform: translateY(2px); box-shadow: 0 2px 5px rgba(0,0,0,0.5); }

        /* Audio Btn */
        #audio-btn {
            position: absolute; top: 20px; right: 20px; z-index: 50;
            background: rgba(212, 175, 55, 0.2); border: 1px solid #d4af37; color: #d4af37;
            border-radius: 50%; width: 45px; height: 45px; font-size: 1.2rem; cursor: pointer; display: none; backdrop-filter: blur(5px);
        }

        /* Animations */
        @keyframes pulse3D { 0%, 100% { transform: translate(-50%, -50%) translateZ(20px) scale(1); } 50% { transform: translate(-50%, -50%) translateZ(40px) scale(1.05); box-shadow: 0 0 50px #ffea00; } }
        @keyframes flipIn { 0% { opacity: 0; transform: rotateY(90deg) scale(0.5) translateZ(-500px); } 100% { opacity: 1; transform: rotateY(0deg) scale(1) translateZ(0); } }
        @keyframes float { 0%, 100% { transform: translateZ(50px) translateY(0); } 50% { transform: translateZ(50px) translateY(-10px); } }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }
        @keyframes floatUp { 0% { bottom: -100px; transform: rotate(0deg); opacity: 0; } 20% { opacity: 0.6; } 100% { bottom: 100vh; transform: rotate(20deg); opacity: 0; } }
    </style>
</head>
<body>

    <!-- RELIABLE AUDIO -->
    <audio id="bg-music" loop>
        <source src="https://ia801905.us.archive.org/30/items/ramadan-background-music/ramadan-background.mp3" type="audio/mp3">
    </audio>

    <!-- Background Elements -->
    <canvas id="particles"></canvas>
    
    <!-- Floating SVGs -->
    <svg class="fanoos" viewBox="0 0 24 24" fill="none" stroke="#d4af37" stroke-width="1.5"><path d="M12 2L12 5M12 5H9.5L8 10H16L14.5 5H12ZM12 5V10M8 10L6 19H18L16 10M8 10H16M6 19H18M12 10V19M9 14.5H15M10.5 19L9 22H15L13.5 19"/></svg>
    <svg class="fanoos" viewBox="0 0 24 24" fill="none" stroke="#d4af37" stroke-width="1.5"><path d="M12 2L12 5M12 5H9.5L8 10H16L14.5 5H12ZM12 5V10M8 10L6 19H18L16 10M8 10H16M6 19H18M12 10V19M9 14.5H15M10.5 19L9 22H15L13.5 19"/></svg>
    <svg class="fanoos" viewBox="0 0 24 24" fill="none" stroke="#d4af37" stroke-width="1.5"><path d="M12 2L12 5M12 5H9.5L8 10H16L14.5 5H12ZM12 5V10M8 10L6 19H18L16 10M8 10H16M6 19H18M12 10V19M9 14.5H15M10.5 19L9 22H15L13.5 19"/></svg>

    <button id="audio-btn" onclick="toggleAudio()">🔊</button>

    <!-- 3D Gates -->
    <div id="gate-container">
        <div id="gate-left" class="gate"></div>
        <div id="gate-right" class="gate"></div>
        <div id="open-btn" onclick="openGates()">
            <span>Open</span>
            <div class="tap-hint">Tap Here</div>
        </div>
    </div>

    <!-- Main Card -->
    <div id="card-wrapper">
        <div id="card">
            <div class="glare" id="glare"></div> <!-- 3D Light Reflection -->
            
            <div class="bismillah">﷽</div>
            <div class="moon-icon">🌙</div>
            <h1 class="text-3d" id="friend-name">Eid Mubarak</h1>
            
            <!-- Typewriter Message Box -->
            <div class="message-box">
                <div class="typewriter-text"><span id="typed"></span><span class="typing-cursor"></span></div>
            </div>

            <div class="divider"></div>
            
            <div class="from">Ramzan Ahsan</div>
            
            <div class="share-container">
                <input type="text" id="customName" placeholder="Type Friend's Name...">
                <button class="share-btn" onclick="shareOnWhatsApp()">📤 Send VIP Wish</button>
            </div>
        </div>
    </div>

    <script>
        // --- 1. Audio & Gates Logic ---
        let music = document.getElementById("bg-music");

        function openGates() {
            music.volume = 0.6;
            let playPromise = music.play();
            if (playPromise !== undefined) {
                playPromise.then(_ => { document.getElementById('audio-btn').style.display = 'block'; })
                .catch(e => { let btn = document.getElementById("audio-btn"); btn.innerHTML = "🔇"; btn.style.display = 'block'; });
            }

            document.getElementById('open-btn').style.transform = "translate(-50%, -50%) translateZ(-200px) scale(0)";
            document.getElementById('open-btn').style.opacity = "0";
            document.getElementById('gate-left').style.transform = 'rotateY(100deg)';
            document.getElementById('gate-right').style.transform = 'rotateY(-100deg)';

            setTimeout(() => {
                document.getElementById('gate-container').style.display = 'none';
                document.getElementById('card-wrapper').style.display = 'flex';
                startParticles();
                setTimeout(startTypewriter, 1000); // Start typing after card flips in
            }, 1200);
        }

        function toggleAudio() {
            let btn = document.getElementById("audio-btn");
            if(music.paused) { music.play(); btn.innerHTML = "🔊"; } else { music.pause(); btn.innerHTML = "🔇"; }
        }

        // --- 2. Live Typewriter Effect (Your Special Message) ---
        const messageText = "Assalamu Alaykum! ✨\n\nRamzan Ahsan ki taraf se aapko aur aapke poore parivaar ko dil ki gehraiyon se Eid Mubarak ho!\n\nAllah is mubarak din par aapki har dua qabool farmaye. Ameen! 🤲";
        let i = 0;
        const speed = 40; // Typing speed in milliseconds

        function startTypewriter() {
            if (i < messageText.length) {
                document.getElementById("typed").innerHTML += messageText.charAt(i);
                i++;
                setTimeout(startTypewriter, speed);
            } else {
                // Stop cursor blink when done
                document.querySelector('.typing-cursor').style.display = 'none';
            }
        }

        // --- 3. 3D Tilt & Light Glare Effect (Gyrometer & Mouse) ---
        const card = document.getElementById('card');
        const glare = document.getElementById('glare');
        
        // PC Mouse Move
        document.addEventListener('mousemove', (e) => {
            if (document.getElementById('card-wrapper').style.display === 'flex') {
                let xAxis = (window.innerWidth / 2 - e.pageX) / 25;
                let yAxis = (window.innerHeight / 2 - e.pageY) / 25;
                card.style.transform = `rotateY(${xAxis}deg) rotateX(${yAxis}deg)`;
                
                // Move Light Reflection
                let lightX = (e.pageX / window.innerWidth) * 100;
                let lightY = (e.pageY / window.innerHeight) * 100;
                glare.style.background = `radial-gradient(circle at ${lightX}% ${lightY}%, rgba(255, 255, 255, 0.2), transparent 50%)`;
            }
        });

        // Mobile Gyroscope
        if (window.DeviceOrientationEvent) {
            window.addEventListener('deviceorientation', (e) => {
                if (document.getElementById('card-wrapper').style.display === 'flex') {
                    let yAxis = Math.max(-20, Math.min(20, e.beta - 45)) / 1.5;
                    let xAxis = Math.max(-20, Math.min(20, e.gamma)) / 1.5;
                    card.style.transform = `rotateY(${xAxis}deg) rotateX(${-yAxis}deg)`;
                    
                    // Move Light Reflection based on tilt
                    let lightX = 50 + xAxis * 2;
                    let lightY = 50 + yAxis * 2;
                    glare.style.background = `radial-gradient(circle at ${lightX}% ${lightY}%, rgba(255, 255, 255, 0.2), transparent 50%)`;
                }
            });
        }

        // Reset
        document.addEventListener('mouseleave', () => { 
            card.style.transform = `rotateY(0deg) rotateX(0deg)`; 
            glare.style.background = `radial-gradient(circle at 50% 50%, rgba(255, 255, 255, 0.1), transparent 50%)`;
        });

        // --- 4. Tap to Explode Fireworks ---
        window.addEventListener('click', (e) => {
            if(document.getElementById('card-wrapper').style.display === 'flex') {
                createExplosion(e.clientX, e.clientY);
            }
        });

        function createExplosion(x, y) {
            for(let i=0; i<15; i++) {
                let spark = document.createElement('div');
                spark.style.position = 'absolute';
                spark.style.left = x + 'px';
                spark.style.top = y + 'px';
                spark.style.width = '4px'; spark.style.height = '4px';
                spark.style.background = '#d4af37'; spark.style.borderRadius = '50%';
                spark.style.pointerEvents = 'none'; spark.style.zIndex = '999';
                spark.style.boxShadow = '0 0 10px #fff';
                document.body.appendChild(spark);
                
                let angle = Math.random() * Math.PI * 2;
                let velocity = Math.random() * 50 + 20;
                let tx = Math.cos(angle) * velocity;
                let ty = Math.sin(angle) * velocity;
                
                spark.animate([
                    { transform: 'translate(0,0) scale(1)', opacity: 1 },
                    { transform: `translate(${tx}px, ${ty}px) scale(0)`, opacity: 0 }
                ], { duration: 600, easing: 'ease-out' }).onfinish = () => spark.remove();
            }
        }

        // --- 5. Share Logic ---
        window.onload = function() {
            const urlParams = new URLSearchParams(window.location.search);
            const friendName = urlParams.get('name');
            if (friendName) document.getElementById('friend-name').innerHTML = friendName;
        }

        function shareOnWhatsApp() {
            let friend = document.getElementById('customName').value.trim();
            let baseUrl = window.location.origin + window.location.pathname;
            let finalUrl = friend ? baseUrl + "?name=" + encodeURIComponent(friend) : baseUrl;
            let message = "🌙 *Assalamu Alaykum!*\n\n*Raman Ahsan* ki taraf se aapko ek pyara sa Eid ka tohfa! ✨🎁\n\nJaldi se is neele link par click karke dekhiye:\n👉 " + finalUrl;
            window.open("https://api.whatsapp.com/send?text=" + encodeURIComponent(message));
        }

        // --- 6. 3D Golden Dust Canvas ---
        const canvas = document.getElementById('particles');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth; canvas.height = window.innerHeight;

        let particlesArray = [];
        class Particle {
            constructor() {
                this.x = Math.random() * canvas.width; this.y = canvas.height + Math.random() * 100;
                this.z = Math.random() * 2 + 0.5; this.size = this.z * 1.5;
                this.speedY = -(this.z * 0.8); this.speedX = (Math.random() - 0.5) * 1;
                this.opacity = Math.random() * 0.8 + 0.2;
            }
            update() {
                this.y += this.speedY; this.x += this.speedX;
                if (this.y < -10) { this.y = canvas.height + 10; this.x = Math.random() * canvas.width; }
            }
            draw() {
                ctx.fillStyle = `rgba(212, 175, 55, ${this.opacity})`;
                ctx.shadowBlur = 10; ctx.shadowColor = '#d4af37';
                ctx.beginPath(); ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2); ctx.fill();
            }
        }
        function startParticles() {
            let numParticles = (canvas.width * canvas.height) / 7000;
            for (let i = 0; i < numParticles; i++) particlesArray.push(new Particle());
            function animate() {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                particlesArray.forEach(p => { p.update(); p.draw(); });
                requestAnimationFrame(animate);
            }
            animate();
        }
        window.addEventListener('resize', () => {
            canvas.width = window.innerWidth; canvas.height = window.innerHeight;
            particlesArray = []; startParticles();
        });
    </script>
</body>
</html>
